# If you see OpenRouter/Google error 499 "CANCELLED": the upstream call was aborted
# (browser closed SSE, idle timeout, user navigated away) or Google cancelled a stuck
# request. Retries below help transient cases; client-side aborts will still fail.

.openrouter_shared: &openrouter_shared
  api_base: https://openrouter.ai/api/v1
  api_key: os.environ/OPENROUTER_API_KEY
  custom_llm_provider: openai
  # Long agent + tool runs; raise if you hit read timeouts
  timeout: 600
  stream_timeout: 600
  extra_header
      model: google/gemini-3.1merge *openrouter_shared here. That alias
  # sets custom_llm_provider: openai + api_base, which forwards the literal
  # `openrouter/<vendor>/<model>` string to OpenRouter and breaks (OpenRouter
  # expects `<vendor>/<model>`). Letting LiteLLM use its native `openrouter/`
  # provider makes it strip the prefix automatically.
  - model_name: "openrouter/*"
    litellm_params:
      # `google-adk` pins `litellm<=1.82.6`, which has the #24234 regression
      # where the proxy forwards the `openrouter/` prefix to OpenRouter
      # (rejected as "not a valid mo
        HTTP-Referer: "https://www.k-dense.ai"
        X-Title: "Kady-Expert"

  # ── Local Ollama (no API key required) ──
  # Wildcard so any tag the user pulls into their Ollama server is routable
  # without editing this file. `ollama_chat/*` preserves the model name tag
  # (e.g. `ollama/qwen3.6:8b` -> `ollama_chat/qwen3.6:8b`).
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama_chat/*"
      api_base: os.environ/OLLAMA_BASE_URL
      timeout: 600
      stream_timeout: 600

router_settings:
  # Retry failed routing attempts (helps flaky upstream / transient errors)
  num_retries: 4
  model_group_alias:
    # ADK / LiteLLM appends "-customtools" when tool calling is enabled — route to the base deployment.
    "gemini-3.1-pro-preview-customtools": "gemini-3.1-pro-preview"
    "gemini-3-flash-preview-customtools": "gemini-3-flash-preview"
    "gemini-3-flash-preview": "gemini-3-flash-preview"
    "gemini-3.1-flash-lite-preview-customtools": "gemini-3-flash-preview"
    # Gemini CLI internal model IDs -> LiteLLM model_name (see @google/gemini-cli-core defaultModelConfigs)
    "gemini-2.5-pro": "gemini-3.1-pro-preview"
    "gemini-2.5-flash": "gemini-3-flash-preview"
    "gemini-2.5-flash-lite": "gemini-3-flash-preview"
    "gemini-3-pro-preview": "gemini-3.1-pro-preview"

general_settings:
  master_key: sk-litellm-local

litellm_settings:
  # Backport of litellm PR #24282 that strips a stray `openrouter/` prefix
  # before dispatch. Required because `google-adk` pins litellm<=1.82.6 which
  # still has the #24234 regression. `callbacks` accepts a dotted
  # `module.instance` path; importing `litellm_callbacks` installs the patches
  # as a side effect.
  callbacks: ["litellm_callbacks.proxy_handler_instance"]
